# Full nginx.conf for the docker-socket version-rewrite proxy.
# Runs workers as root (the docker socket is root-owned) and rewrites Traefik's
# pinned API path /vX.Y/... -> /v1.44/... so OrbStack / Docker Desktop (min API 1.40)
# accept it. Not needed on a plain Linux Docker host.
user root;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;
events { worker_connections 1024; }
http {
  access_log off;
  server {
    listen 2375;
    location / {
      rewrite ^/v[0-9]+\.[0-9]+/(.*)$ /v1.44/$1 break;
      proxy_pass http://unix:/var/run/docker.sock:;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host localhost;
      proxy_buffering off;
      proxy_read_timeout 3600s;
    }
  }
}
